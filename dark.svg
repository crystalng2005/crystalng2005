<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <radialGradient id="vortexGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#24194c"/>
      <stop offset="40%" stop-color="#141433" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0e0e22" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="neonGradient1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6a35ff"/>
      <stop offset="100%" stop-color="#ff1aff"/>
    </linearGradient>
    <linearGradient id="neonGradient2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#ff1aff"/>
    </linearGradient>
    
    <path id="data_path_python" d="M 450 150 Q 550 50 650 100 T 800 150" fill="none" />
    <path id="data_path_js" d="M 450 150 Q 500 250 600 200 T 750 250" fill="none" />
    <path id="data_path_chart" d="M 450 150 Q 300 250 150 200 T 100 150" fill="none" />
    
    <g id="skill_python" opacity="0">
      <circle cx="0" cy="0" r="15" fill="#1e1e3e" stroke="#6a35ff" stroke-width="2"/>
      <text x="0" y="5" font-size="12" font-weight="700" font-family="Courier New, Courier, monospace" fill="#6a35ff" text-anchor="middle">PYTHON</text>
    </g>
    <g id="skill_js" opacity="0">
      <circle cx="0" cy="0" r="15" fill="#1e1e3e" stroke="#ff1aff" stroke-width="2"/>
      <text x="0" y="5" font-size="12" font-weight="700" font-family="Courier New, Courier, monospace" fill="#ff1aff" text-anchor="middle">JAVASCRIPT</text>
    </g>
    </defs>

  <rect width="100%" height="100%" fill="#0a0a1a"/>
  
  <g transform="translate(450,150)" id="vortex_main">
    <circle cx="0" cy="0" r="150" fill="url(#vortexGlow)" opacity="1">
      <animate attributeName="opacity" values="1;0.7;1" dur="4s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="6s" repeatCount="indefinite" additive="sum"/>
    </circle>
    
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="20s" repeatCount="indefinite" />
      <path d="M-100 0 A100 100 0 1 1 100 0" fill="none" stroke="url(#neonGradient1)" stroke-width="3" stroke-dasharray="10 5"/>
      <path d="M0 -100 A100 100 0 1 1 0 100" fill="none" stroke="url(#neonGradient2)" stroke-width="3" stroke-dasharray="10 5" opacity="0.6"/>
    </g>
  </g>
  
  <g>
    <use xlink:href="#skill_python">
      <animate attributeName="opacity" values="0;1;1" dur="2s" begin="0.5s" fill="freeze" />
      <animateMotion dur="4s" repeatCount="indefinite" fill="freeze">
        <mpath xlink:href="#data_path_python"/>
      </animateMotion>
    </use>
    <use xlink:href="#skill_js">
      <animate attributeName="opacity" values="0;1;1" dur="2s" begin="1.5s" fill="freeze" />
      <animateMotion dur="4s" repeatCount="indefinite" fill="freeze" rotate="auto">
        <mpath xlink:href="#data_path_js"/>
      </animateMotion>
    </use>
    
    <g transform="translate(50,220)" opacity="0">
        <animate attributeName="opacity" values="0;1;1" dur="1s" begin="3s" fill="freeze" />
        <rect width="15" height="15" fill="#141433" stroke="#2a2a6a">
            <animate attributeName="fill" values="#141433;#141433;#6a35ff;#141433" dur="5s" begin="3s" repeatCount="indefinite" />
        </rect>
        <rect x="20" width="15" height="15" fill="#141433" stroke="#2a2a6a">
            <animate attributeName="fill" values="#141433;#141433;#6a35ff;#141433" dur="5s" begin="3.2s" repeatCount="indefinite" />
        </rect>
        <rect x="40" width="15" height="15" fill="#141433" stroke="#2a2a6a">
            <animate attributeName="fill" values="#141433;#141433;#6a35ff;#141433" dur="5s" begin="3.4s" repeatCount="indefinite" />
        </rect>
    </g>
  </g>
  
  <text x="800" y="50" font-size="14" font-family="Courier New, Courier, monospace" fill="#ff1aff" text-anchor="end" opacity="0">
    Impacting with code...
    <animate attributeName="opacity" values="0;1;1" dur="1s" begin="0.1s" fill="freeze" />
  </text>
  
  <g transform="translate(50,50)" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="1s" begin="0.2s" fill="freeze" />
    <text x="0" y="20" font-size="24" font-weight="900" font-family="Helvetica, Arial, sans-serif" fill="#ffffff">crystalng2005</text>
    <text x="0" y="50" font-size="12" font-family="Courier New, Courier, monospace" fill="#8888ff" opacity="0.8">Continuous code impact</text>
  </g>
  
  <g transform="translate(50, 270)" opacity="0">
    <animate attributeName="opacity" values="0;1;1" dur="1s" begin="2s" fill="freeze" />
    <text x="0" y="0" font-size="20" font-weight="900" font-family="Helvetica, Arial, sans-serif" fill="#6a35ff">24</text>
    <text x="30" y="0" font-size="12" font-family="Courier New, Courier, monospace" fill="#8888ff" opacity="0.8">STREAK</text>
  </g>

</svg>
